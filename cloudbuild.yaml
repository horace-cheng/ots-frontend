steps:
  # 1. Build the Next.js Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'asia-east1-docker.pkg.dev/$PROJECT_ID/ots/ots-frontend-$_ENV:$COMMIT_SHA'
      - '-t'
      - 'asia-east1-docker.pkg.dev/$PROJECT_ID/ots/ots-frontend-$_ENV:latest'
      - '--build-arg'
      - 'NEXT_PUBLIC_API_URL=$_NEXT_PUBLIC_API_URL'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_API_KEY=$_NEXT_PUBLIC_FIREBASE_API_KEY'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=$_NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_PROJECT_ID=$_NEXT_PUBLIC_FIREBASE_PROJECT_ID'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_APP_ID=$_NEXT_PUBLIC_FIREBASE_APP_ID'
      - '.'

  # 2. Push the image to Google Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'asia-east1-docker.pkg.dev/$PROJECT_ID/ots/ots-frontend-$_ENV'
      - '--all-tags'

  # 3. Deploy the image to Google Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'ots-frontend-$_ENV'
      - '--image'
      - 'asia-east1-docker.pkg.dev/$PROJECT_ID/ots/ots-frontend-$_ENV:$COMMIT_SHA'
      - '--region'
      - 'asia-east1'
      - '--allow-unauthenticated'

substitutions:
  _ENV: 'dev'
  _NEXT_PUBLIC_API_URL: ''
  _NEXT_PUBLIC_FIREBASE_API_KEY: ''
  _NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ''
  _NEXT_PUBLIC_FIREBASE_PROJECT_ID: ''
  _NEXT_PUBLIC_FIREBASE_APP_ID: ''  

images:
  - 'asia-east1-docker.pkg.dev/$PROJECT_ID/ots/ots-frontend-$_ENV:$COMMIT_SHA'
  - 'asia-east1-docker.pkg.dev/$PROJECT_ID/ots/ots-frontend-$_ENV:latest'

options:
  logging: CLOUD_LOGGING_ONLY
